name: trish_frontend
description: TRISH - AI-Powered Dating App with eCommerce & Wallet
version: 1.0.0+1
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Networking
  http: ^1.1.0
  web_socket_channel: ^2.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  
  # Image Handling
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  
  # UI Components & Animations
  flutter_card_swiper: ^6.0.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  animate_do: ^3.1.2
  flutter_staggered_animations: ^1.1.1
  
  # Location
  geolocator: ^10.1.0
  permission_handler: ^11.2.0
  
  # Chat & Communication
  emoji_picker_flutter: ^1.6.3
  file_picker: ^6.1.1
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  
  # Security & Authentication
  flutter_secure_storage: ^9.0.0
  
  # Utilities
  intl: ^0.18.1
  uuid: ^4.3.3
  timeago: ^3.6.0
  connectivity_plus: ^5.0.2
  
  # Rating & Reviews
  flutter_rating_bar: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
