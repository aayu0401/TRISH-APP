name: trish_frontend
description: TRISH - AI-Powered Dating App with eCommerce & Wallet
version: 1.0.0+1
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  get: ^4.6.6
  
  # Networking
  http: ^1.1.0
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  
  # Local Storage & Database
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # Image Handling
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  image_cropper: ^5.0.1
  photo_view: ^0.14.0
  
  # UI Components & Animations
  flutter_card_swiper: ^6.0.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  lottie: ^3.0.0
  animate_do: ^3.1.2
  flutter_staggered_animations: ^1.1.1
  confetti: ^0.7.0
  
  # Location & Maps
  geolocator: ^10.1.0
  permission_handler: ^11.2.0
  google_maps_flutter: ^2.5.0
  geocoding: ^2.1.1
  
  # Payment & Wallet
  razorpay_flutter: ^1.3.6
  stripe_payment: any
  # flutter_paystack: any
  
  # KYC & Verification
  flutter_document_scanner: any
  camera: ^0.10.5+7
  face_camera: any
  
  # Chat & Communication
  emoji_picker_flutter: ^1.6.3
  file_picker: ^6.1.1
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  
  # Notifications
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.9
  firebase_analytics: ^10.8.0
  flutter_local_notifications: ^16.3.0
  
  # Security & Authentication
  local_auth: ^2.1.8
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  
  # Video & Media
  video_player: ^2.8.2
  chewie: ^1.7.5
  
  # Charts & Analytics
  fl_chart: ^0.66.0
  syncfusion_flutter_charts: ^24.1.41
  
  # Utilities
  intl: ^0.18.1
  uuid: ^4.3.3
  timeago: ^3.6.0
  connectivity_plus: ^5.0.2
  package_info_plus: ^5.0.1
  device_info_plus: ^9.1.1
  
  # QR Code
  qr_flutter: ^4.1.0
  qr_code_scanner: ^1.0.1
  
  # Rating & Reviews
  flutter_rating_bar: ^4.0.1
  
  # Stories & Carousel
  story_view: ^0.16.0
  carousel_slider: ^4.2.1
  
  # Pull to Refresh
  pull_to_refresh: ^2.0.0
  
  # Badges
  badges: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/lottie/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600

