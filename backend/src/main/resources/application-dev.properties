# Dev profile (no external DB required)
#
# Run with:
#   mvnw spring-boot:run -Dspring-boot.run.profiles=dev
# or:
#   java -jar target/trish-backend-0.0.1-SNAPSHOT.jar --spring.profiles.active=dev

# H2 in-memory DB (PostgreSQL compatibility mode)
spring.datasource.url=jdbc:h2:mem:trish_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Optional: H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# React dev server
app.frontend-url=http://localhost:5173
