# Production profile
#
# Configure via environment variables (recommended). Example:
#   SPRING_PROFILES_ACTIVE=prod
#   SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/trish_db
#   SPRING_DATASOURCE_USERNAME=postgres
#   SPRING_DATASOURCE_PASSWORD=...
#   JWT_SECRET=...
#   APP_CORS_ALLOWED_ORIGINS=https://trish.app

server.port=${PORT:8080}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/trish_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# JWT
jwt.secret=${JWT_SECRET:CHANGE_ME_IN_PROD}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS / Frontend
app.frontend-url=${APP_FRONTEND_URL:https://trish.app}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://trish.app}

# AI Engine
ai.engine.url=${AI_ENGINE_URL:http://localhost:8000}

# Logging
logging.level.com.trish=INFO
logging.level.org.springframework.security=INFO

